# scope:   pr
# type:    check
# trigger: issue_comment, pull_request_review_comment, issues, pull_request_review
# paths:   - (global)
name: PR – Check Gemini

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  gemini:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@gemini'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      issues: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45

      - name: Run Gemini Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        with:
          script: |
            const fs = require('fs');

            const changedFiles = process.env.FILES
              .split(' ')
              .filter(Boolean)
              .slice(0, 50);

            let fileContents = '';

            for (const file of changedFiles) {
              try {
                const content = fs.readFileSync(file, 'utf8');

                fileContents += `
                ====================================
                FILE: ${file}
                ====================================

                ${content.substring(0, 2500)}
                `;

              } catch (e) {
                console.log(`Skipping unreadable file: ${file}`);
              }
            }

            const prompt = `
            REPO: ${{ github.repository }}
            PR NUMBER: ${context.payload.pull_request?.number || context.payload.issue?.number || 'N/A'}

            Perform a comprehensive code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Testing**
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            CHANGED FILES:
            ${changedFiles.join('\n')}

            FILE CONTENTS:
            ${fileContents}

            Provide detailed feedback using inline comments for specific issues.
            Use top-level comments for general observations or praise.
            `;

            // Retry logic with exponential backoff
            const maxRetries = 5;
            const initialDelay = 1000;
            let retryCount = 0;
            let data;
            let lastError;

            while (retryCount < maxRetries) {
              try {
                const response = await fetch(
                  'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
                  {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      contents: [
                        {
                          parts: [
                            {
                              text: prompt
                            }
                          ]
                        }
                      ],
                      generationConfig: {
                        temperature: 0.3,
                        topP: 0.9,
                        topK: 20,
                        maxOutputTokens: 8192
                      }
                    })
                  }
                );

                data = await response.json();

                if (response.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                  break;
                }

                if (response.status === 429) {
                  const retryDelay = data?.error?.details?.[2]?.retryDelay || '7s';
                  const delayMs = parseInt(retryDelay) * 1000 || (initialDelay * Math.pow(2, retryCount));
                  console.log(`Quota exceeded. Retrying in ${delayMs/1000}s (attempt ${retryCount + 1}/${maxRetries})`);
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  retryCount++;
                  lastError = data.error?.message || 'Quota exceeded';
                  continue;
                }

                console.log(JSON.stringify(data, null, 2));
                throw new Error(`Invalid Gemini response: ${data.error?.message || 'Unknown error'}`);

              } catch (error) {
                if (retryCount < maxRetries - 1) {
                  const delayMs = initialDelay * Math.pow(2, retryCount);
                  console.log(`Error occurred. Retrying in ${delayMs/1000}s (attempt ${retryCount + 1}/${maxRetries})`);
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  retryCount++;
                  lastError = error.message;
                } else {
                  throw error;
                }
              }
            }

            if (!data.candidates?.[0]?.content?.parts?.[0]?.text) {
              console.log(JSON.stringify(data, null, 2));
              throw new Error(`Invalid Gemini response after ${maxRetries} retries. Last error: ${lastError}`);
            }

            const review = data.candidates[0].content.parts[0].text;

            // Determine PR number based on event type
            let prNumber;
            if (github.event_name === 'pull_request' || github.event_name === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
            } else if (github.event_name === 'issue_comment' && context.payload.issue.pull_request) {
              prNumber = context.payload.issue.number;
            }

            // Post the review as a comment
            if (prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: review
              });
            } else {
              console.log('No valid PR number found, skipping comment');
            }
