# scope:   pr
# type:    check
# trigger: issue_comment, pull_request_review_comment, issues, pull_request_review
# paths:   - (global)
name: PR – Check Gemini

on:
  pull_request:
    types: [opened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  gemini:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/review') && github.event.comment.user.login != 'dependabot[bot]') ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '/review') && github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      issues: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45

      - name: Run Gemini Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        with:
          script: |
            const { runReview } = require('.github/scripts/ai-review.js');
            await runReview(context, github, process.env);
