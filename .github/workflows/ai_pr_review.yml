name: PR – Check Gemini

# Trigger workflow on PR events, PR review submissions, and comments
on:
  pull_request:
    types: [opened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  gemini:
    # Only run for PR events, review comments, or "!review" comments on PRs
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '!review')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '!review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      issues: read
      actions: read
    steps:

      # Debug event payload
      - name: Debug event payload
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "PR URL: ${{ github.event.pull_request.url || github.event.issue.pull_request.url || 'N/A' }}"
          echo "Comment body: ${{ github.event.comment.body || github.event.review.body || 'N/A' }}"

      # Determine PR number and head SHA
      - name: Get PR info
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, sha;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              sha = context.payload.pull_request.head.sha;
            } else if (context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
              sha = context.payload.pull_request.head.sha;
            } else if (context.eventName === 'issue_comment' && context.payload.issue.pull_request) {
              // Extract PR number from issue.pull_request.url
              const prUrl = context.payload.issue.pull_request.url;
              prNumber = parseInt(prUrl.split('/').pop());
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              sha = pr.data.head.sha;
            }

            console.log(`PR number: ${prNumber}`);
            console.log(`PR SHA: ${sha}`);

            return { pr_number: prNumber, pr_sha: sha };

      # Checkout the correct PR branch
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-info.outputs.pr_sha }}

      # Get changed files in PR
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          pr_number: ${{ steps.pr-info.outputs.pr_number }}

      # Run Gemini Code Review
      - name: Run Gemini Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        with:
          script: |
            const fs = require('fs');

            const changedFiles = process.env.FILES
              .split(' ')
              .filter(Boolean);

            let fileContents = '';
            for (const file of changedFiles) {
              try {
                fileContents += `
                ====================================
                FILE: ${file}
                ====================================

                ${fs.readFileSync(file, 'utf8')}
                `;
              } catch {
                console.log(`Skipping unreadable file: ${file}`);
              }
            }

            const prompt = `
              REPO: ${{ github.repository }}
              PR NUMBER: ${{ steps.pr-info.outputs.pr_number }}

              You are a Senior Software Engineer performing a thorough code review.

              REVIEW PRINCIPLES:
              1. CRITICAL THINKING
              2. CODE QUALITY
              3. SECURITY
              4. PERFORMANCE
              5. TESTING
              6. FUTURE-ORIENTED DESIGN

              CHANGED FILES:
              ${changedFiles.join('\n')}

              FILE CONTENTS:
              ${fileContents}

              OUTPUT FORMAT (strict JSON):
              Return ONLY valid JSON with this structure:
              {
                "issues": [
                  {
                    "file": "src/file.ts",
                    "line": 10,
                    "type": "Security",
                    "description": "SQL injection vulnerability",
                    "code_snippet": "const query = \"SELECT * FROM users WHERE id = \" + userId;"
                  }
                ]
              }
            `;

            const maxRetries = 5;
            let retryCount = 0;
            let responseData;

            while (retryCount < maxRetries) {
              try {
                const response = await fetch(
                  'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
                  {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      contents: [{ parts: [{ text: prompt }] }],
                      generationConfig: {
                        temperature: 0.3,
                        topP: 0.9,
                        topK: 20,
                        maxOutputTokens: 65536
                      }
                    })
                  }
                );

                responseData = await response.json();
                if (response.ok && responseData.candidates?.[0]?.content?.parts?.[0]?.text) break;

                retryCount++;
                await new Promise(r => setTimeout(r, 2000 * Math.pow(2, retryCount)));
              } catch {
                retryCount++;
                await new Promise(r => setTimeout(r, 2000 * Math.pow(2, retryCount)));
              }
            }

            if (!responseData?.candidates?.[0]?.content?.parts?.[0]?.text) {
              throw new Error('Gemini API failed after retries.');
            }

            let reviewText = responseData.candidates[0].content.parts[0].text.trim();
            if (reviewText.startsWith('```')) reviewText = reviewText.replace(/^```json\n|```$/g, '');
            const reviewData = JSON.parse(reviewText);

            const comments = [];
            if (reviewData.issues && Array.isArray(reviewData.issues)) {
              for (const issue of reviewData.issues) {
                if (issue.file && issue.line) {
                  comments.push({
                    path: issue.file,
                    line: issue.line,
                    body: `**${issue.type}**: ${issue.description}\n\`\`\`\n${issue.code_snippet || ''}\n\`\`\``
                  });
                }
              }
            }

            const prNumber = parseInt('${{ steps.pr-info.outputs.pr_number }}');
            const prSha = '${{ steps.pr-info.outputs.pr_sha }}';

            if (prNumber) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: prSha,
                body: '',
                comments: comments,
                event: comments.length > 0 ? 'REQUEST_CHANGES' : 'COMMENT'
              });
            }
