# scope:   pr
# type:    check
# trigger: issue_comment, pull_request_review_comment, issues, pull_request_review
# paths:   - (global)
name: PR – Check Gemini

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  gemini:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@gemini'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      issues: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45

      - name: Run Gemini Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        with:
          script: |
            const fs = require('fs');

            const changedFiles = process.env.FILES
              .split(' ')
              .filter(Boolean)
              .slice(0, 50);

            let fileContents = '';

            for (const file of changedFiles) {
              try {
                const content = fs.readFileSync(file, 'utf8');

                fileContents += `
                ====================================
                FILE: ${file}
                ====================================

                ${content.substring(0, 2500)}
                `;

              } catch (e) {
                console.log(`Skipping unreadable file: ${file}`);
              }
            }

            const prompt = `
            REPO: ${{ github.repository }}
            PR NUMBER: ${context.payload.pull_request?.number || context.payload.issue?.number || 'N/A'}

            You are a Senior Software Engineer performing a thorough code review.

            REVIEW PRINCIPLES:
            1. CRITICAL THINKING - Challenge assumptions, identify redundant code, suggest better alternatives
            2. CODE QUALITY - Best practices, error handling, readability, maintainability
            3. SECURITY - Vulnerabilities, input sanitization, authentication/authorization
            4. PERFORMANCE - Bottlenecks, efficiency, memory leaks, scalability
            5. TESTING - Coverage, edge cases, test quality
            6. FUTURE-ORIENTED - Modular design, extensibility, avoid tight coupling

            When reviewing, consider:
            * Is this code intuitive and maintainable?
            * Are there edge cases not handled?
            * Can this be simplified without losing functionality?
            * Are there security risks or performance issues?
            * Is the architecture scalable and extensible?

            CHANGED FILES:
            ${changedFiles.join('\n')}

            FILE CONTENTS:
            ${fileContents}

            OUTPUT FORMAT (strict JSON):
            Return ONLY valid JSON with this structure:
            {
              "summary": "One sentence overview of the PR quality",
              "issues": [
                {
                  "file": "src/file.ts",
                  "line": 10,
                  "type": "Security",
                  "description": "SQL injection vulnerability",
                  "code_snippet": "const query = \"SELECT * FROM users WHERE id = \" + userId;"
                }
              ],
              "positives": [
                {
                  "file": "src/component.ts",
                  "line": 5,
                  "description": "Clean component structure"
                }
              ]
            }

            IMPORTANT:
            - Return ONLY the JSON, no markdown formatting
            - Line numbers must be integers
            - Files must be from the changed files list
            - Focus on actual issues, not theoretical concerns
            - Be direct and actionable
            `;

            // Retry logic with exponential backoff
            const maxRetries = 10;
            const initialDelay = 2000;
            let retryCount = 0;
            let data;
            let lastError;

            // Helper to parse retry delay from API response
            const parseRetryDelay = (errorDetails) => {
              if (!errorDetails) return null;
              for (const detail of errorDetails) {
                if (detail.retryDelay) {
                  const match = detail.retryDelay.match(/(\d+)/);
                  if (match) {
                    return parseInt(match[1]) * 1000;
                  }
                }
              }
              return null;
            };

            while (retryCount < maxRetries) {
              try {
                const response = await fetch(
                  'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
                  {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      contents: [
                        {
                          parts: [
                            {
                              text: prompt
                            }
                          ]
                        }
                      ],
                      generationConfig: {
                        temperature: 0.3,
                        topP: 0.9,
                        topK: 20,
                        maxOutputTokens: 8192
                      }
                    })
                  }
                );

                data = await response.json();

                if (response.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                  break;
                }

                if (response.status === 429) {
                  const apiDelay = parseRetryDelay(data?.error?.details);
                  const exponentialDelay = initialDelay * Math.pow(2, retryCount);
                  const delayMs = apiDelay || exponentialDelay;
                  console.log(`Quota exceeded. Retrying in ${delayMs/1000}s (attempt ${retryCount + 1}/${maxRetries})`);
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  retryCount++;
                  lastError = data.error?.message || 'Quota exceeded';
                  continue;
                }

                console.log(JSON.stringify(data, null, 2));
                throw new Error(`Invalid Gemini response: ${data.error?.message || 'Unknown error'}`);

              } catch (error) {
                if (retryCount < maxRetries - 1) {
                  const delayMs = initialDelay * Math.pow(2, retryCount);
                  console.log(`Error occurred. Retrying in ${delayMs/1000}s (attempt ${retryCount + 1}/${maxRetries})`);
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  retryCount++;
                  lastError = error.message;
                } else {
                  throw error;
                }
              }
            }

            if (!data.candidates?.[0]?.content?.parts?.[0]?.text) {
              console.log(JSON.stringify(data, null, 2));
              throw new Error(`Invalid Gemini response after ${maxRetries} retries. Last error: ${lastError}`);
            }

            const reviewText = data.candidates[0].content.parts[0].text;

            // Parse JSON response (handle potential markdown code blocks)
            let jsonText = reviewText.trim();
            if (jsonText.startsWith('```')) {
              jsonText = jsonText.replace(/^```json\n/, '').replace(/^```\n/, '').replace(/```$/, '');
            }
            
            let reviewData;
            try {
              reviewData = JSON.parse(jsonText);
            } catch (e) {
              console.log('Failed to parse JSON, raw response:', jsonText);
              throw new Error('Failed to parse Gemini response as JSON');
            }

            // Determine PR number based on event type
            let prNumber;
            console.log('Event name:', github.event_name);
            console.log('Payload keys:', Object.keys(context.payload));

            // Try multiple ways to get the PR number
            if (context.payload.pull_request?.number) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.number) {
              prNumber = context.payload.number;
            } else if (context.payload.issue?.number) {
              prNumber = context.payload.issue.number;
            }

            console.log('Determined PR number:', prNumber);

            // Get the PR to retrieve commit SHA for inline comments
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const commitId = pr.data.head.sha;

            // Build inline review comments
            const comments = [];
            
            if (reviewData.issues && Array.isArray(reviewData.issues)) {
              for (const issue of reviewData.issues) {
                if (issue.file && issue.line) {
                  const commentBody = `**${issue.type || 'Issue'}**: ${issue.description}\n\n\`\`\`\n${issue.code_snippet || ''}\n\`\`\``;
                  comments.push({
                    path: issue.file,
                    line: issue.line,
                    body: commentBody
                  });
                }
              }
            }

            // Create a Pull Request Review with inline comments
            if (prNumber) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: commitId,
                body: `## Summary\n\n${reviewData.summary || 'No summary provided.'}\n\n## Positive\n\n${reviewData.positives && reviewData.positives.length > 0 
                  ? reviewData.positives.map(p => `**${p.file}** - Line ${p.line}: ${p.description}`).join('\n')
                  : 'No positive notes.'}`,
                comments: comments,
                event: comments.length > 0 ? 'REQUEST_CHANGES' : 'COMMENT'
              });
            } else {
              console.log('No valid PR number found, skipping review');
            }
