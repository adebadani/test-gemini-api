# scope:   pr
# type:    check
# trigger: issue_comment, pull_request_review_comment, issues, pull_request_review
# paths:   - (global)
name: PR – Check Gemini

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  gemini:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gemini')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@gemini')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@gemini') || contains(github.event.issue.title, '@gemini')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      issues: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini Code Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Determine PR/issue number based on event type
            let prNumber;
            let diffContent = '';

            if (github.event_name === 'pull_request' || github.event_name === 'pull_request_review' || github.event_name === 'pull_request_review_comment') {
              prNumber = context.payload.pull_request.number;
            } else if (github.event_name === 'issue_comment') {
              // issue_comment on a PR - need to check if it's a PR
              if (context.payload.issue.pull_request) {
                prNumber = context.payload.issue.number;
              }
            } else if (github.event_name === 'issues') {
              prNumber = context.payload.issue.number;
            }

            // Get diff if it's a PR
            if (prNumber && (github.event_name === 'pull_request' || github.event_name === 'pull_request_review' || github.event_name === 'pull_request_review_comment' || (github.event_name === 'issue_comment' && context.payload.issue.pull_request))) {
              try {
                diffContent = execSync(`gh pr diff ${prNumber}`, { encoding: 'utf8' });
              } catch (e) {
                console.log('Failed to get PR diff:', e.message);
              }
            }

            const prompt = `
            REPO: ${{ github.repository }}
            PR NUMBER: ${prNumber || 'N/A'}

            You are a senior software engineer performing a comprehensive code review.

            Perform a code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Testing**
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            DIFF CONTENT:
            ${diffContent}

            IMPORTANT: Provide your review as a single markdown comment. Be specific and constructive.
            Start with a brief summary, then list issues found (if any) with specific file paths and line numbers when possible.
            End with any positive observations or suggestions.
            `;

            // Retry logic with exponential backoff
            const maxRetries = 5;
            const initialDelay = 1000;
            let retryCount = 0;
            let data;
            let lastError;

            while (retryCount < maxRetries) {
              try {
                const response = await fetch(
                  'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
                  {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      contents: [
                        {
                          parts: [
                            {
                              text: prompt
                            }
                          ]
                        }
                      ],
                      generationConfig: {
                        temperature: 0.3,
                        topP: 0.9,
                        topK: 20,
                        maxOutputTokens: 8192
                      }
                    })
                  }
                );

                data = await response.json();

                if (response.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                  break;
                }

                if (response.status === 429) {
                  const retryDelay = data?.error?.details?.[2]?.retryDelay || '7s';
                  const delayMs = parseInt(retryDelay) * 1000 || (initialDelay * Math.pow(2, retryCount));
                  console.log(`Quota exceeded. Retrying in ${delayMs/1000}s (attempt ${retryCount + 1}/${maxRetries})`);
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  retryCount++;
                  lastError = data.error?.message || 'Quota exceeded';
                  continue;
                }

                console.log(JSON.stringify(data, null, 2));
                throw new Error(`Invalid Gemini response: ${data.error?.message || 'Unknown error'}`);

              } catch (error) {
                if (retryCount < maxRetries - 1) {
                  const delayMs = initialDelay * Math.pow(2, retryCount);
                  console.log(`Error occurred. Retrying in ${delayMs/1000}s (attempt ${retryCount + 1}/${maxRetries})`);
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  retryCount++;
                  lastError = error.message;
                } else {
                  throw error;
                }
              }
            }

            if (!data.candidates?.[0]?.content?.parts?.[0]?.text) {
              console.log(JSON.stringify(data, null, 2));
              throw new Error(`Invalid Gemini response after ${maxRetries} retries. Last error: ${lastError}`);
            }

            const review = data.candidates[0].content.parts[0].text;

            // Post the review as a comment
            if (prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: review
              });
            } else {
              console.log('No valid PR/issue number found, skipping comment');
            }
