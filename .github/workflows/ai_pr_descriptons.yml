name: Generate AI PR Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45

      - name: Generate AI PR Description
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        with:
          script: |
            const fs = require('fs');

            const changedFiles = process.env.FILES
              .split(' ')
              .filter(Boolean)
              .slice(0, 50);

            let fileContents = '';
            let fileChangesSection = '';

            for (const file of changedFiles) {
              try {
                const content = fs.readFileSync(file, 'utf8');

                fileContents += `
                ====================================
                FILE: ${file}
                ====================================

                ${content.substring(0, 2500)}
                `;

                fileChangesSection += `- \`${file}\`\n`;

              } catch (e) {
                console.log(`Skipping unreadable file: ${file}`);
              }
            }

            const prompt = `
            You are a senior software engineer.

            Generate a professional GitHub Pull Request description.

            STRICT RULES:
            - Output VALID markdown only
            - DO NOT wrap content inside HTML comments
            - DO NOT use <!-- -->
            - KEEP the exact section order
            - KEEP checklist sections unchanged
            - Generate realistic technical explanations
            - File changes MUST be generated from changed files
            - Explain what changed per file
            - Detect breaking changes automatically
            - Generate testing steps
            - Generate side effects if applicable
            - Use professional engineering language
            - Be concise but informative

            REQUIRED FORMAT:

            ## 📝 Summary

            Short summary here

            ## 🗃️ File Changes

            - \`file-name.ts\` - explanation
            - \`another-file.ts\` - explanation

            ## 🌊 Changes

            - Change 1
            - Change 2

            ## 💥 Breaking Changes

            - Breaking change here

            ## ✍️ How To Test

            1. Step 1
            2. Step 2

            ## 🌳 Side Effects

            - Side effect

            ## 📷 Screenshots or Records

            ## 💻 BE Dependencies

            - Dependency here

            ## ✅ PR Checklist
            - [ ] Title uses UniPin format
            - [ ] Assign mentor, product owner, and leads as PR reviewer
            - [ ] Assign yourself as assignee
            - [ ] Choose the matching labels with the related issue(s)
            - [ ] Connect related issue(s) to this PR
            - [ ] Write PR description that match with the template
            - [ ] Assign PR to the related milestone **(if applicable)**
            - [ ] Fill in sprint information for this PR
            - [ ] Move this PR to "Code Review" list inside project board
            - [ ] Move correspondent issue(s), to code review status inside project board

            ## ✅ Review Checklist
            - [ ] Feature works correctly
            - [ ] Loading state works
            - [ ] Permissions work correctly

            CHANGED FILES:
            ${changedFiles.join('\n')}

            FILE CONTENTS:
            ${fileContents}
            `;

            // Retry logic with exponential backoff
            const maxRetries = 5;
            const initialDelay = 1000; // 1 second
            let retryCount = 0;
            let data;
            let lastError;

            while (retryCount < maxRetries) {
              try {
                const response = await fetch(
                  'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + process.env.GEMINI_API_KEY,
                  {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      contents: [
                        {
                          parts: [
                            {
                              text: prompt
                            }
                          ]
                        }
                      ],
                      generationConfig: {
                        temperature: 0.2,
                        topP: 0.9,
                        topK: 20,
                        maxOutputTokens: 4096
                      }
                    })
                  }
                );

                data = await response.json();

                if (response.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                  break; // Success, exit retry loop
                }

                // Handle quota errors (429)
                if (response.status === 429) {
                  const retryDelay = data?.error?.details?.[2]?.retryDelay || '7s';
                  const delayMs = parseInt(retryDelay) * 1000 || (initialDelay * Math.pow(2, retryCount));
                  console.log(`Quota exceeded. Retrying in ${delayMs/1000}s (attempt ${retryCount + 1}/${maxRetries})`);
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  retryCount++;
                  lastError = data.error?.message || 'Quota exceeded';
                  continue;
                }

                // Other errors
                console.log(JSON.stringify(data, null, 2));
                throw new Error(`Invalid Gemini response: ${data.error?.message || 'Unknown error'}`);

              } catch (error) {
                if (retryCount < maxRetries - 1) {
                  const delayMs = initialDelay * Math.pow(2, retryCount);
                  console.log(`Error occurred. Retrying in ${delayMs/1000}s (attempt ${retryCount + 1}/${maxRetries})`);
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  retryCount++;
                  lastError = error.message;
                } else {
                  throw error;
                }
              }
            }

            if (!data.candidates?.[0]?.content?.parts?.[0]?.text) {
              console.log(JSON.stringify(data, null, 2));
              throw new Error(`Invalid Gemini response after ${maxRetries} retries. Last error: ${lastError}`);
            }

            const generatedPR =
              data.candidates[0].content.parts[0].text;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: generatedPR
            });